{% extends "base.html" %}
{% block title %}Log in · HealthHub{% endblock %}
{% block content %}
<div class="min-h-[70vh] grid place-items-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <span class="inline-grid place-items-center w-12 h-12 rounded-xl bg-brand-600 text-white text-xl font-semibold mx-auto">H</span>
      <h1 class="mt-3 text-2xl font-semibold text-slate-900">Welcome back</h1>
      <p class="text-sm text-slate-500">Log in to your HealthHub account</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <p class="text-sm text-red-600">{{ form.non_field_errors }}</p>
        {% endif %}
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="username" required
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none">
        </div>
        <button type="submit"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg py-2.5 text-sm transition">
          Log in
        </button>
      </form>
    </div>
    <p class="text-center text-sm text-slate-500 mt-4">
      No account? <a href="{% url 'accounts:register' %}" class="text-brand-700 font-medium hover:underline">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
