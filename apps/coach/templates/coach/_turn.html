{% for m in messages %}
  {% if m.role == 'user' %}
    <div class="flex justify-end">
      <div class="max-w-[80%] bg-brand-600 text-white rounded-2xl rounded-br-sm px-4 py-2.5 text-sm">
        {{ m.content }}
      </div>
    </div>
  {% else %}
    <div class="flex justify-start">
      <div class="max-w-[80%] {% if m.was_blocked %}bg-amber-50 text-amber-900 border border-amber-200{% else %}bg-white text-slate-700 border border-slate-200{% endif %} rounded-2xl rounded-bl-sm px-4 py-2.5 text-sm">
        {% if m.was_blocked %}
          <p class="flex items-center gap-1.5 text-xs font-medium text-amber-700 mb-1">
            <span>⚠</span> Safety guardrail
          </p>
        {% endif %}
        {{ m.content }}
      </div>
    </div>
  {% endif %}
{% endfor %}
